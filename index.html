<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d4a20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Keuangan Eryu</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-title" content="Keuangan">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Albert+Sans:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ivory:     #f4f1e8;
      --ivory-2:   #ede9dc;
      --card:      #fdfcf7;
      --ink:       #25211a;
      --ink-2:     #514c41;
      --muted:     #8a8070;
      --border:    #ddd7c4;
      --green:     #3e5e2e;
      --green-2:   #567d40;
      --green-soft:#e6eedf;
      --red:       #b84a2e;
      --red-soft:  #f5ddd7;
      --teal:      #0e6b7a;
      --ochre:     #9a7218;
      --sans:  'Albert Sans', system-ui, sans-serif;
      --serif: 'Source Serif 4', Georgia, serif;
      --mono:  'Spline Sans Mono', 'Courier New', monospace;
    }

    body {
      font-family: var(--sans);
      background: var(--ivory);
      color: var(--ink);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(160deg, #2d4a20 0%, #3e5e2e 55%, #4d7439 100%);
      color: white;
      padding: 22px 20px 18px;
      position: relative;
      overflow: hidden;
    }
    header::after {
      content: '';
      position: absolute;
      right: -30px; top: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
    }
    .hdr-eyebrow {
      font-size: 0.65rem; font-weight: 700; letter-spacing: .25em;
      text-transform: uppercase; opacity: .65; margin-bottom: 4px;
    }
    header h1 {
      font-family: var(--serif);
      font-size: 1.35rem; font-weight: 600;
      letter-spacing: -.01em; line-height: 1.2;
    }
    header h1 em { font-style: italic; opacity: .8; }
    .hdr-date {
      font-size: 0.75rem; opacity: .6; margin-top: 4px; font-weight: 500;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 1px 8px rgba(37,33,26,.07);
    }
    .tab {
      flex: 1; padding: 12px 6px;
      text-align: center; font-size: 0.78rem; font-weight: 700;
      color: var(--muted); cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: color .2s, border-color .2s;
      user-select: none; letter-spacing: .01em;
    }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    /* ── PAGES ── */
    .page { display: none; padding: 16px; }
    .page.active { display: block; animation: fadeUp .4s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* ── FORM ── */
    .form-section {
      font-size: 0.65rem; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .18em; margin: 20px 0 10px;
    }
    .form-section:first-child { margin-top: 4px; }

    .row { display: grid; gap: 10px; }
    .row.col2 { grid-template-columns: 1fr 1fr; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 0.72rem; font-weight: 700; color: var(--ink-2); letter-spacing: .01em; }

    input, select {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.9rem; font-family: var(--sans);
      color: var(--ink); background: var(--card);
      appearance: none; -webkit-appearance: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--green-2);
      box-shadow: 0 0 0 3px rgba(62,94,46,.12);
    }
    .sel-wrap { position: relative; }
    .sel-wrap::after {
      content: '▾'; position: absolute;
      right: 13px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 0.85rem; pointer-events: none;
    }

    .jumlah-wrap { position: relative; }
    .jumlah-wrap input { padding-left: 40px; font-family: var(--sans); font-variant-numeric: tabular-nums; font-size: 0.95rem; font-weight: 600; }
    .jumlah-prefix {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      font-size: 0.78rem; font-weight: 700; color: var(--muted);
    }

    .btn-submit {
      width: 100%; margin-top: 22px; padding: 15px;
      background: linear-gradient(135deg, var(--green), var(--green-2));
      color: white; border: none; border-radius: 12px;
      font-family: var(--sans); font-size: 0.95rem; font-weight: 700;
      letter-spacing: .02em; cursor: pointer;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 14px rgba(62,94,46,.3);
    }
    .btn-submit:active { transform: scale(.98); opacity: .9; }
    .btn-submit:disabled { background: #b8c4b0; box-shadow: none; cursor: not-allowed; transform: none; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom) + 16px);
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--green); color: white;
      padding: 12px 24px; border-radius: 99px;
      font-family: var(--sans); font-size: 0.85rem; font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      transition: transform .3s cubic-bezier(.175,.885,.32,1.275);
      z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err  { background: var(--red); }

    /* ── RIWAYAT FILTER ── */
    .filter-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .filter-row .sel-wrap { flex: 1; }
    .filter-row select { padding: 9px 12px; font-size: 0.82rem; }

    /* ── TX CARD ── */
    .tx-list { display: flex; flex-direction: column; gap: 8px; }
    .tx-card {
      background: var(--card); border-radius: 14px;
      padding: 13px 14px; display: flex;
      justify-content: space-between; align-items: center;
      box-shadow: 0 1px 3px rgba(37,33,26,.06), 0 4px 12px rgba(37,33,26,.04);
      border: 1px solid var(--border); gap: 10px;
    }
    .tx-keterangan { font-weight: 700; font-size: 0.9rem; }
    .tx-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }

    .badge {
      padding: 2px 8px; border-radius: 99px;
      font-size: 0.65rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .badge-suami    { background: #dbeafe; color: #1d4ed8; }
    .badge-istri    { background: #fce7f3; color: #9d174d; }
    .badge-tabungan { background: var(--green-soft); color: var(--green); }

    .tx-kat { font-size: 0.72rem; color: var(--muted); }
    .tx-tgl { font-size: 0.72rem; color: var(--muted); }

    .tx-right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .tx-jumlah          { font-family: var(--sans); font-variant-numeric: tabular-nums; font-weight: 700; font-size: 0.95rem; color: var(--red); }
    .tx-jumlah.masuk    { color: var(--green); }
    .tx-jumlah.tabungan { color: var(--teal); }
    .tx-metode { font-size: 0.7rem; color: var(--muted); }

    .btn-delete {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.8rem; padding: 4px 2px;
      opacity: 0; transition: opacity .2s, color .15s;
      line-height: 1;
    }
    .tx-card:hover .btn-delete,
    .tx-card:active .btn-delete { opacity: 1; }
    .btn-delete:hover { color: var(--red); }

    @media (hover: none) { .btn-delete { opacity: 0.45; } }

    .empty { text-align: center; color: var(--muted); padding: 48px 20px; font-size: 0.9rem; }
    .empty span { display: block; font-size: 2rem; margin-bottom: 8px; }

    .loading-row { display: flex; flex-direction: column; gap: 8px; }
    .skeleton {
      background: linear-gradient(90deg, var(--ivory-2) 25%, #e6e1d2 50%, var(--ivory-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.3s infinite;
      border-radius: 12px; height: 68px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── DASHBOARD ── */
    .dash-month-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border-radius: 12px; padding: 10px 16px;
      box-shadow: 0 1px 3px rgba(37,33,26,.06); border: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .dash-month-nav button {
      background: none; border: none; font-size: 1.4rem;
      color: var(--green); cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .dash-month-label { font-family: var(--serif); font-weight: 600; font-size: 1rem; }

    .dash-total-card {
      background: linear-gradient(155deg, #2d4a20 0%, #3e5e2e 60%, #4d7439 100%);
      color: white; border-radius: 18px; padding: 22px 20px 18px;
      margin-bottom: 10px; position: relative; overflow: hidden;
    }
    .dash-total-card::after {
      content: ''; position: absolute;
      right: -20px; bottom: -30px;
      width: 140px; height: 140px; border-radius: 50%;
      background: rgba(255,255,255,.05);
    }
    .dash-total-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; opacity: .7; margin-bottom: 6px;
    }
    .dash-total-amount {
      font-family: var(--serif); font-size: 2rem; font-weight: 700;
      letter-spacing: -.02em; line-height: 1;
    }
    .dash-net { margin-top: 10px; font-size: 0.8rem; }
    .dash-net.surplus { color: #a7f3d0; }
    .dash-net.defisit { color: #fca5a5; }

    .dash-person-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .dash-person-card {
      background: var(--card); border-radius: 14px; padding: 14px;
      box-shadow: 0 1px 3px rgba(37,33,26,.06); border: 1px solid var(--border);
    }
    .dash-person-name {
      font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .12em; margin-bottom: 6px;
    }
    .dash-person-card.suami .dash-person-name { color: #1d4ed8; }
    .dash-person-card.istri  .dash-person-name { color: #9d174d; }
    .dash-person-amount { font-family: var(--sans); font-variant-numeric: tabular-nums; font-size: 1rem; font-weight: 700; color: var(--red); }
    .dash-person-tx { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

    .dash-section {
      font-size: 0.65rem; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .18em; margin: 16px 0 9px;
    }

    .dash-kat-list { display: flex; flex-direction: column; gap: 8px; }
    .dash-kat-item {
      background: var(--card); border-radius: 14px; padding: 13px 14px;
      box-shadow: 0 1px 3px rgba(37,33,26,.06); border: 1px solid var(--border);
    }
    .dash-kat-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .dash-kat-name { font-size: 0.85rem; font-weight: 700; }
    .dash-kat-amount { font-family: var(--sans); font-variant-numeric: tabular-nums; font-size: 0.9rem; font-weight: 700; color: var(--red); }
    .dash-kat-budget { font-size: 0.72rem; color: var(--muted); }
    .dash-kat-budget.over { color: var(--red); font-weight: 700; }
    .dash-kat-pct { font-family: var(--sans); font-variant-numeric: tabular-nums; font-size: 0.75rem; font-weight: 700; color: var(--muted); }
    .dash-kat-excess { font-size: 0.72rem; color: var(--red); font-weight: 700; margin-top: 5px; }

    .dash-bar-bg { background: var(--ivory-2); border-radius: 99px; height: 6px; overflow: hidden; }
    .dash-bar-fill {
      background: linear-gradient(90deg, var(--green), var(--green-2));
      height: 100%; border-radius: 99px; transition: width .7s cubic-bezier(.2,.8,.2,1);
    }
    .dash-bar-fill.over {
      background: linear-gradient(90deg, var(--red), #d4714f);
      animation: pulse-bar 1.4s ease-in-out infinite;
    }
    .dash-bar-fill.warn { background: linear-gradient(90deg, var(--ochre), #c49430); }
    @keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:.65} }

    .dash-metode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
    .dash-metode-card {
      background: var(--card); border-radius: 14px; padding: 14px;
      box-shadow: 0 1px 3px rgba(37,33,26,.06); border: 1px solid var(--border);
      text-align: center;
    }
    .dash-metode-name {
      font-size: 0.68rem; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px;
    }
    .dash-metode-amount { font-family: var(--sans); font-variant-numeric: tabular-nums; font-size: 1rem; font-weight: 700; }

    .dash-empty { text-align: center; color: var(--muted); padding: 48px 20px; font-size: 0.9rem; }
    .dash-empty span { display: block; font-size: 2rem; margin-bottom: 8px; }
  </style>
</head>
<body>

<header>
  <div class="hdr-eyebrow">Catatan Keuangan</div>
  <h1>Keuangan <em>Eryu</em></h1>
  <div class="hdr-date" id="hdr-date"></div>
</header>

<nav>
  <div class="tab active" data-page="input">＋ Input</div>
  <div class="tab"        data-page="dashboard">◎ Ringkasan</div>
  <div class="tab"        data-page="riwayat">≡ Riwayat</div>
</nav>

<!-- ===== INPUT ===== -->
<div class="page active" id="page-input">
  <form id="form-tx" autocomplete="off">

    <div class="form-section">Waktu & Pelaku</div>
    <div class="row col2">
      <div class="field">
        <label>Tanggal</label>
        <input type="date" id="f-tanggal" required>
      </div>
      <div class="field">
        <label>Siapa</label>
        <div class="sel-wrap">
          <select id="f-siapa" required>
            <option value="">Pilih...</option>
            <option value="Suami">Suami</option>
            <option value="Istri">Istri</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">Jenis & Kategori</div>
    <div class="row col2">
      <div class="field">
        <label>Jenis</label>
        <div class="sel-wrap">
          <select id="f-jenis" required>
            <option value="">Pilih...</option>
            <option value="Pengeluaran">Pengeluaran</option>
            <option value="Pemasukan">Pemasukan</option>
            <option value="Tabungan">Tabungan</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Metode</label>
        <div class="sel-wrap">
          <select id="f-metode" required>
            <option value="">Pilih...</option>
            <option value="Cash">Cash</option>
            <option value="Non-Tunai">Non-Tunai</option>
          </select>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <div class="field">
        <label>Kategori</label>
        <div class="sel-wrap">
          <select id="f-kategori" required>
            <option value="">— pilih Siapa dulu —</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">Detail</div>
    <div class="field" style="margin-bottom:10px">
      <label>Keterangan</label>
      <input type="text" id="f-keterangan" placeholder="cth: Tagihan listrik Juni" enterkeyhint="next" required>
    </div>
    <div class="field">
      <label>Jumlah</label>
      <div class="jumlah-wrap">
        <span class="jumlah-prefix">Rp</span>
        <input type="number" id="f-jumlah" placeholder="0" min="1" inputmode="numeric" required>
      </div>
    </div>

    <button type="submit" class="btn-submit" id="btn-submit">Simpan Transaksi</button>
  </form>
</div>

<!-- ===== DASHBOARD ===== -->
<div class="page" id="page-dashboard">
  <div class="dash-month-nav">
    <button id="dash-prev">‹</button>
    <span class="dash-month-label" id="dash-month-label">—</span>
    <button id="dash-next">›</button>
  </div>
  <div id="dash-content">
    <div class="loading-row">
      <div class="skeleton" style="height:120px;border-radius:18px"></div>
      <div class="skeleton" style="height:80px"></div>
      <div class="skeleton" style="height:220px"></div>
    </div>
  </div>
</div>

<!-- ===== RIWAYAT ===== -->
<div class="page" id="page-riwayat">
  <div class="filter-row">
    <div class="sel-wrap">
      <select id="fil-siapa">
        <option value="">Semua</option>
        <option value="Suami">Suami</option>
        <option value="Istri">Istri</option>
      </select>
    </div>
    <div class="sel-wrap">
      <select id="fil-jenis">
        <option value="">Semua Jenis</option>
        <option value="Pengeluaran">Pengeluaran</option>
        <option value="Pemasukan">Pemasukan</option>
        <option value="Tabungan">Tabungan</option>
      </select>
    </div>
  </div>
  <div class="tx-list" id="tx-list">
    <div class="loading-row">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbxS099i6FKREaL4imS5REDy9Ns3QVO_75HOllI1uL4L9HSS1_TV1da9mMIgerl8FfwejA/exec';

  const KATEGORI = {
    Suami: ['Keluarga & Orang Tua','Tagihan Rutin','Pekerjaan',
            'Anak & Sekolah','Konsumsi & Belanja','Gaya Hidup','Pemeliharaan','Sosial'],
    Istri: ['Keluarga & Orang Tua','Pekerjaan','Anak & Sekolah','Gaya Hidup','Sosial'],
    Tabungan: ['Dana Darurat','Tabungan Reguler','Investasi','Dana Pendidikan']
  };

  // ── Init ──
  const $  = id => document.getElementById(id);
  const today = () => new Date().toISOString().split('T')[0];

  $('f-tanggal').value = today();
  $('hdr-date').textContent = new Date().toLocaleDateString('id-ID',
    { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // ── Nav tabs ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab, .page').forEach(el => el.classList.remove('active'));
      tab.classList.add('active');
      $('page-' + tab.dataset.page).classList.add('active');
      if (tab.dataset.page === 'riwayat')   loadRiwayat();
      if (tab.dataset.page === 'dashboard') loadDashboard();
    });
  });

  // ── Dropdown kategori ──
  function updateKategori() {
    const jenis = $('f-jenis').value;
    const siapa = $('f-siapa').value;
    const sel   = $('f-kategori');
    if (jenis === 'Tabungan') {
      sel.innerHTML = '<option value="">Pilih kategori...</option>' +
        KATEGORI.Tabungan.map(k => `<option value="${k}">${k}</option>`).join('');
      return;
    }
    if (!siapa) {
      sel.innerHTML = '<option value="">— pilih Siapa dulu —</option>';
      return;
    }
    sel.innerHTML = '<option value="">Pilih kategori...</option>' +
      (KATEGORI[siapa] || []).map(k => `<option value="${k}">${k}</option>`).join('');
  }
  $('f-siapa').addEventListener('change', updateKategori);
  $('f-jenis').addEventListener('change', updateKategori);

  // ── Toast ──
  let toastTimer;
  function toast(msg, err = false) {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'toast show' + (err ? ' err' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = 'toast', 3200);
  }

  // ── Format rupiah ──
  const rp = n => 'Rp ' + Number(n).toLocaleString('id-ID');

  // ── Submit transaksi ──
  $('form-tx').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = $('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Menyimpan…';

    const params = new URLSearchParams({
      action    : 'add',
      tanggal   : $('f-tanggal').value,
      siapa     : $('f-siapa').value,
      jenis     : $('f-jenis').value,
      kategori  : $('f-kategori').value,
      keterangan: $('f-keterangan').value,
      jumlah    : $('f-jumlah').value,
      metode    : $('f-metode').value,
    });

    try {
      const res  = await fetch(API + '?' + params);
      const json = await res.json();
      if (json.ok) {
        toast('✓ Transaksi tersimpan!');
        _dashData = null; _anggaranData = null;
        $('form-tx').reset();
        $('f-tanggal').value = today();
        $('f-kategori').innerHTML = '<option value="">— pilih Siapa dulu —</option>';
      } else {
        toast('Gagal: ' + (json.error || 'unknown'), true);
      }
    } catch {
      toast('Gagal menyimpan. Cek koneksi.', true);
    }

    btn.disabled = false;
    btn.textContent = 'Simpan Transaksi';
  });

  // ── Load riwayat ──
  async function loadRiwayat() {
    const list = $('tx-list');
    list.innerHTML = '<div class="loading-row">' +
      '<div class="skeleton"></div>'.repeat(4) + '</div>';

    try {
      const res  = await fetch(API + '?action=get&t=' + Date.now());
      const json = await res.json();

      let rows = json.data || [];
      const fs = $('fil-siapa').value;
      const fj = $('fil-jenis').value;
      if (fs) rows = rows.filter(r => r.siapa === fs);
      if (fj) rows = rows.filter(r => r.jenis === fj);

      rows.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

      if (!rows.length) {
        list.innerHTML = '<div class="empty"><span>🗂️</span>Belum ada transaksi.</div>';
        return;
      }

      list.innerHTML = rows.map(r => {
        const tgl  = new Date(r.tanggal);
        const tglF = isNaN(tgl) ? r.tanggal :
          tgl.toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
        const masuk   = r.jenis === 'Pemasukan';
        const tabung  = r.jenis === 'Tabungan';
        const jumlahCls = masuk ? ' masuk' : tabung ? ' tabungan' : '';
        const prefix    = masuk ? '+' : tabung ? '🏦 ' : '−';
        const badgeCls  = tabung ? 'tabungan' : r.siapa.toLowerCase();
        const badgeTxt  = tabung ? 'Tabungan' : r.siapa;
        return `
          <div class="tx-card">
            <div class="tx-left">
              <div class="tx-keterangan">${r.keterangan}</div>
              <div class="tx-meta">
                <span class="badge badge-${badgeCls}">${badgeTxt}</span>
                <span class="tx-kat">${r.kategori}</span>
                <span class="tx-tgl">· ${tglF}</span>
              </div>
            </div>
            <div class="tx-right">
              <div class="tx-jumlah${jumlahCls}">${prefix}${rp(r.jumlah)}</div>
              <div class="tx-metode">${r.metode}</div>
              <button class="btn-delete" data-id="${r.id}" title="Hapus transaksi">🗑</button>
            </div>
          </div>`;
      }).join('');
      // delegate hapus
      list.addEventListener('click', async e => {
        const btn = e.target.closest('.btn-delete');
        if (!btn) return;
        if (!confirm('Hapus transaksi ini?')) return;
        btn.textContent = '…'; btn.disabled = true;
        try {
          const res  = await fetch(API + '?action=delete&id=' + btn.dataset.id);
          const json = await res.json();
          if (json.ok) {
            _dashData = null;
            btn.closest('.tx-card').remove();
            toast('Transaksi dihapus.');
          } else {
            toast('Gagal hapus: ' + (json.error || 'unknown'), true);
            btn.textContent = '🗑'; btn.disabled = false;
          }
        } catch {
          toast('Gagal menghubungi server.', true);
          btn.textContent = '🗑'; btn.disabled = false;
        }
      });
    } catch {
      list.innerHTML = '<div class="empty"><span>⚠️</span>Gagal memuat data.</div>';
    }
  }

  // ── Dashboard ──
  const BULAN_ID = ['Januari','Februari','Maret','April','Mei','Juni',
                    'Juli','Agustus','September','Oktober','November','Desember'];
  let _dashData     = null;
  let _anggaranData = null;
  let dashYear  = new Date().getFullYear();
  let dashMonth = new Date().getMonth();

  $('dash-prev').addEventListener('click', () => {
    dashMonth--; if (dashMonth < 0) { dashMonth = 11; dashYear--; }
    renderDash();
  });
  $('dash-next').addEventListener('click', () => {
    dashMonth++; if (dashMonth > 11) { dashMonth = 0; dashYear++; }
    renderDash();
  });

  async function loadDashboard() {
    if (!_dashData || !_anggaranData) {
      $('dash-content').innerHTML = '<div class="loading-row">' +
        '<div class="skeleton" style="height:120px;border-radius:18px"></div>' +
        '<div class="skeleton" style="height:80px"></div>' +
        '<div class="skeleton" style="height:220px"></div></div>';
      try {
        const t = Date.now();
        const [resTx, resAng] = await Promise.all([
          fetch(API + '?action=get&t=' + t),
          fetch(API + '?action=anggaran&t=' + t)
        ]);
        const [jsonTx, jsonAng] = await Promise.all([resTx.json(), resAng.json()]);
        _dashData     = jsonTx.data  || [];
        _anggaranData = jsonAng.data || [];
      } catch {
        $('dash-content').innerHTML = '<div class="dash-empty"><span>⚠️</span>Gagal memuat data.</div>';
        return;
      }
    }
    renderDash();
  }

  function renderDash() {
    $('dash-month-label').textContent = BULAN_ID[dashMonth] + ' ' + dashYear;

    const rows = (_dashData || []).filter(r => {
      const d = new Date(r.tanggal);
      return d.getFullYear() === dashYear && d.getMonth() === dashMonth;
    });

    if (!rows.length) {
      $('dash-content').innerHTML = '<div class="dash-empty"><span>📭</span>Belum ada transaksi bulan ini.</div>';
      return;
    }

    const keluar = rows.filter(r => r.jenis === 'Pengeluaran');
    const masuk  = rows.filter(r => r.jenis === 'Pemasukan');
    const tabung = rows.filter(r => r.jenis === 'Tabungan');
    const totalKeluar = keluar.reduce((s, r) => s + Number(r.jumlah), 0);
    const totalMasuk  = masuk.reduce((s,  r) => s + Number(r.jumlah), 0);
    const totalTabung = tabung.reduce((s, r) => s + Number(r.jumlah), 0);

    const suamiKeluar = keluar.filter(r => r.siapa === 'Suami').reduce((s, r) => s + Number(r.jumlah), 0);
    const istriKeluar = keluar.filter(r => r.siapa === 'Istri').reduce((s,  r) => s + Number(r.jumlah), 0);
    const suamiMasuk  = masuk.filter(r => r.siapa === 'Suami').reduce((s, r) => s + Number(r.jumlah), 0);
    const istriMasuk  = masuk.filter(r => r.siapa === 'Istri').reduce((s,  r) => s + Number(r.jumlah), 0);
    const suamiTx = keluar.filter(r => r.siapa === 'Suami').length;
    const istriTx = keluar.filter(r => r.siapa === 'Istri').length;

    const ang = _anggaranData || [];
    const angKatMap = {};
    ang.forEach(a => {
      const kat = a.kategori || a['category'] || '';
      const jml = Number(a.jumlah || a.anggaran || 0);
      angKatMap[kat] = (angKatMap[kat] || 0) + jml;
    });
    const totalAnggaran = Object.values(angKatMap).reduce((s, v) => s + v, 0);

    const katMap = {};
    keluar.forEach(r => { katMap[r.kategori] = (katMap[r.kategori] || 0) + Number(r.jumlah); });
    const katSorted = Object.entries(katMap).sort((a, b) => b[1] - a[1]);

    const cashTotal     = keluar.filter(r => r.metode === 'Cash').reduce((s, r) => s + Number(r.jumlah), 0);
    const nonTunaiTotal = keluar.filter(r => r.metode !== 'Cash').reduce((s, r) => s + Number(r.jumlah), 0);

    const sisa = totalMasuk - totalKeluar - totalTabung;
    const sisaLabel = sisa >= 0 ? 'surplus' : 'defisit';
    const sisaStr   = (sisa >= 0 ? '+' : '−') + rp(Math.abs(sisa));
    const hasAnggaran = totalAnggaran > 0;

    $('dash-content').innerHTML = `
      <div class="dash-total-card">
        <div class="dash-total-label">Pengeluaran${hasAnggaran ? '  ·  Anggaran ' + rp(totalAnggaran) : ''}</div>
        <div class="dash-total-amount">${rp(totalKeluar)}</div>
        ${totalMasuk > 0 ? `
        <div style="margin-top:14px;border-top:1px solid rgba(255,255,255,.2);padding-top:12px;display:flex;flex-direction:column;gap:6px">
          <div class="dash-net" style="opacity:1;display:flex;justify-content:space-between">
            <span>📥 Pendapatan</span><span style="font-family:var(--mono)">${rp(totalMasuk)}</span>
          </div>
          ${totalTabung > 0 ? `
          <div class="dash-net" style="opacity:1;display:flex;justify-content:space-between">
            <span>🏦 Tabungan</span><span style="font-family:var(--mono)">${rp(totalTabung)}</span>
          </div>` : ''}
          <div class="dash-net ${sisaLabel}" style="opacity:1;display:flex;justify-content:space-between;font-weight:700;font-size:0.88rem">
            <span>Sisa</span><span style="font-family:var(--mono)">${sisaStr}</span>
          </div>
        </div>` : ''}
      </div>

      <div class="dash-person-row">
        <div class="dash-person-card suami">
          <div class="dash-person-name">Suami</div>
          <div class="dash-person-amount">${rp(suamiKeluar)}</div>
          <div class="dash-person-tx">${suamiTx} transaksi</div>
        </div>
        <div class="dash-person-card istri">
          <div class="dash-person-name">Istri</div>
          <div class="dash-person-amount">${rp(istriKeluar)}</div>
          <div class="dash-person-tx">${istriTx} transaksi</div>
        </div>
      </div>

      <div class="dash-section">Pengeluaran per Kategori${hasAnggaran ? ' vs Anggaran' : ''}</div>
      <div class="dash-kat-list">
        ${katSorted.map(([kat, aktual]) => {
          const budget = angKatMap[kat] || 0;
          const hasBudget = budget > 0;
          const pctRaw = hasBudget ? (aktual / budget * 100) : 0;
          const pct    = Math.round(pctRaw);
          const barW   = hasBudget ? Math.min(pct, 100) : 100;
          const isOver = hasBudget && aktual > budget;
          const isWarn = hasBudget && !isOver && pct >= 85;
          const cls    = isOver ? 'over' : isWarn ? 'warn' : '';
          const excess = aktual - budget;
          return `
          <div class="dash-kat-item${isOver ? ' style="border-color:#f5c6bb"' : ''}">
            <div class="dash-kat-header">
              <span class="dash-kat-name">${kat}</span>
              <span class="dash-kat-amount">${rp(aktual)}</span>
            </div>
            ${hasBudget ? `
            <div class="dash-kat-header" style="margin-bottom:6px">
              <span class="dash-kat-budget ${isOver ? 'over' : ''}">dari ${rp(budget)}</span>
              <span class="dash-kat-pct" style="color:${isOver?'var(--red)':isWarn?'var(--ochre)':'var(--muted)'}">${pct}%</span>
            </div>
            ${isOver ? `<div class="dash-kat-excess">⚠️ Melebihi anggaran ${rp(excess)}</div>` : ''}` : ''}
            <div class="dash-bar-bg" style="margin-top:${isOver?'6':'0'}px">
              <div class="dash-bar-fill ${cls}" style="width:${barW}%"></div>
            </div>
          </div>`;
        }).join('')}
      </div>

      ${totalMasuk > 0 ? `
      <div class="dash-section">Pendapatan</div>
      <div class="dash-person-row">
        <div class="dash-person-card suami">
          <div class="dash-person-name">Suami</div>
          <div class="dash-person-amount" style="color:var(--green)">${rp(suamiMasuk)}</div>
          <div class="dash-person-tx">${masuk.filter(r=>r.siapa==='Suami').length} transaksi</div>
        </div>
        <div class="dash-person-card istri">
          <div class="dash-person-name">Istri</div>
          <div class="dash-person-amount" style="color:var(--green)">${rp(istriMasuk)}</div>
          <div class="dash-person-tx">${masuk.filter(r=>r.siapa==='Istri').length} transaksi</div>
        </div>
      </div>` : ''}

      ${totalTabung > 0 ? `
      <div class="dash-section">Tabungan & Investasi</div>
      <div class="dash-kat-list">
        ${Object.entries(tabung.reduce((m, r) => {
            m[r.kategori] = (m[r.kategori] || 0) + Number(r.jumlah); return m;
          }, {}))
          .sort((a, b) => b[1] - a[1])
          .map(([kat, jml]) => `
          <div class="dash-kat-item">
            <div class="dash-kat-header" style="margin-bottom:0">
              <span class="dash-kat-name">${kat}</span>
              <span class="dash-kat-amount" style="color:var(--teal)">${rp(jml)}</span>
            </div>
          </div>`).join('')}
        <div class="dash-kat-item" style="background:var(--green-soft);border-color:var(--green-soft)">
          <div class="dash-kat-header" style="margin-bottom:0">
            <span class="dash-kat-name" style="color:var(--green)">Total Tabungan</span>
            <span style="font-family:var(--mono);font-weight:700;color:var(--green);font-size:.9rem">${rp(totalTabung)}</span>
          </div>
        </div>
      </div>` : ''}

      <div class="dash-section">Metode Bayar</div>
      <div class="dash-metode-row">
        <div class="dash-metode-card">
          <div class="dash-metode-name">💵 Cash</div>
          <div class="dash-metode-amount">${rp(cashTotal)}</div>
        </div>
        <div class="dash-metode-card">
          <div class="dash-metode-name">💳 Non-Tunai</div>
          <div class="dash-metode-amount">${rp(nonTunaiTotal)}</div>
        </div>
      </div>`;
  }

  // filter change
  document.querySelectorAll('#fil-siapa, #fil-jenis')
    .forEach(el => el.addEventListener('change', loadRiwayat));
</script>
</body>
</html>
