<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a5f4a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Keuangan Eryu</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1a5f4a;
      --green-light: #2d8a6b;
      --red: #c0392b;
      --bg: #f0f4f2;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #7a8f85;
      --border: #dde8e3;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: white;
      padding: 20px 20px 16px;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    header p  { font-size: 0.8rem; opacity: 0.75; margin-top: 3px; }

    /* NAV */
    nav {
      display: flex;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .tab {
      flex: 1;
      padding: 13px 8px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
      user-select: none;
    }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    /* PAGES */
    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    /* FORM */
    .form-section { font-size: 0.7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .8px; margin: 18px 0 10px; }
    .form-section:first-child { margin-top: 4px; }

    .row { display: grid; gap: 10px; }
    .row.col2 { grid-template-columns: 1fr 1fr; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 0.75rem; font-weight: 600; color: var(--muted); }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--card);
      appearance: none;
      -webkit-appearance: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(45,138,107,.12);
    }
    .sel-wrap { position: relative; }
    .sel-wrap::after {
      content: '▾';
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    /* JUMLAH */
    .jumlah-wrap { position: relative; }
    .jumlah-wrap input { padding-left: 40px; }
    .jumlah-prefix {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }

    /* SUBMIT */
    .btn-submit {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .3px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn-submit:active { transform: scale(.98); opacity: .9; }
    .btn-submit:disabled { background: #b0c4bb; cursor: not-allowed; transform: none; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: white;
      padding: 12px 22px;
      border-radius: 24px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      transition: transform .3s cubic-bezier(.175,.885,.32,1.275);
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err   { background: var(--red); }

    /* RIWAYAT */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .filter-row .sel-wrap { flex: 1; }
    .filter-row select { padding: 10px 12px; font-size: 0.85rem; }

    .tx-list { display: flex; flex-direction: column; gap: 8px; }

    .tx-card {
      background: var(--card);
      border-radius: 12px;
      padding: 13px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      gap: 10px;
    }
    .tx-keterangan { font-weight: 600; font-size: 0.92rem; }
    .tx-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .badge {
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .badge-suami { background: #dbeafe; color: #1d4ed8; }
    .badge-istri  { background: #fce7f3; color: #9d174d; }
    .tx-kat { font-size: 0.75rem; color: var(--muted); }
    .tx-tgl { font-size: 0.75rem; color: var(--muted); }

    .tx-right { text-align: right; flex-shrink: 0; }
    .tx-jumlah { font-weight: 700; font-size: 0.95rem; color: var(--red); }
    .tx-jumlah.masuk { color: var(--green); }
    .tx-metode { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 20px;
      font-size: 0.9rem;
    }
    .empty span { display: block; font-size: 2rem; margin-bottom: 8px; }

    .loading-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .skeleton {
      background: linear-gradient(90deg, #e8f0ec 25%, #d4e5da 50%, #e8f0ec 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 12px;
      height: 68px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* DASHBOARD */
    .dash-month-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border-radius: 12px; padding: 10px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 14px;
    }
    .dash-month-nav button {
      background: none; border: none; font-size: 1.5rem;
      color: var(--green); cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .dash-month-label { font-weight: 700; font-size: 0.95rem; }

    .dash-total-card {
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: white; border-radius: 16px; padding: 20px 20px 18px;
      margin-bottom: 10px; text-align: center;
    }
    .dash-total-label { font-size: 0.8rem; opacity: .8; margin-bottom: 4px; }
    .dash-total-amount { font-size: 1.7rem; font-weight: 800; letter-spacing: -.5px; }
    .dash-net { margin-top: 8px; font-size: 0.78rem; opacity: .85; }
    .dash-net.surplus { color: #a7f3d0; }
    .dash-net.defisit { color: #fca5a5; }

    .dash-person-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .dash-person-card {
      background: var(--card); border-radius: 12px; padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .dash-person-name {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 5px;
    }
    .dash-person-card.suami .dash-person-name { color: #1d4ed8; }
    .dash-person-card.istri  .dash-person-name { color: #9d174d; }
    .dash-person-amount { font-size: 1rem; font-weight: 700; color: var(--red); }
    .dash-person-tx { font-size: 0.71rem; color: var(--muted); margin-top: 3px; }

    .dash-section { font-size: 0.7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .8px; margin: 14px 0 8px; }

    .dash-kat-list { display: flex; flex-direction: column; gap: 8px; }
    .dash-kat-item {
      background: var(--card); border-radius: 12px; padding: 12px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .dash-kat-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .dash-kat-name { font-size: 0.85rem; font-weight: 600; }
    .dash-kat-amount { font-size: 0.85rem; font-weight: 700; color: var(--red); }
    .dash-bar-bg { background: var(--bg); border-radius: 4px; height: 6px; overflow: hidden; }
    .dash-bar-fill {
      background: linear-gradient(90deg, var(--green), var(--green-light));
      height: 100%; border-radius: 4px; transition: width .6s ease;
    }
    .dash-bar-fill.over  { background: linear-gradient(90deg, #dc2626, #ef4444); }
    .dash-bar-fill.warn  { background: linear-gradient(90deg, #d97706, #f59e0b); }
    .dash-kat-budget { font-size: 0.75rem; color: var(--muted); }
    .dash-kat-budget.over { color: var(--red); font-weight: 600; }
    .dash-kat-pct { font-size: 0.72rem; font-weight: 600; color: var(--muted); }

    .dash-metode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
    .dash-metode-card {
      background: var(--card); border-radius: 12px; padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); text-align: center;
    }
    .dash-metode-name { font-size: 0.72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
    .dash-metode-amount { font-size: 1rem; font-weight: 700; }

    .dash-empty { text-align: center; color: var(--muted); padding: 48px 20px; font-size: 0.9rem; }
    .dash-empty span { display: block; font-size: 2rem; margin-bottom: 8px; }
  </style>
</head>
<body>

<header>
  <h1>Keuangan Eryu</h1>
  <p id="hdr-date"></p>
</header>

<nav>
  <div class="tab active" data-page="input">➕ Input</div>
  <div class="tab"        data-page="dashboard">📊 Ringkasan</div>
  <div class="tab"        data-page="riwayat">📋 Riwayat</div>
</nav>

<!-- ===== INPUT ===== -->
<div class="page active" id="page-input">
  <form id="form-tx" autocomplete="off">

    <div class="form-section">Waktu & Pelaku</div>
    <div class="row col2">
      <div class="field">
        <label>Tanggal</label>
        <input type="date" id="f-tanggal" required>
      </div>
      <div class="field">
        <label>Siapa</label>
        <div class="sel-wrap">
          <select id="f-siapa" required>
            <option value="">Pilih...</option>
            <option value="Suami">Suami</option>
            <option value="Istri">Istri</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">Jenis & Kategori</div>
    <div class="row col2">
      <div class="field">
        <label>Jenis</label>
        <div class="sel-wrap">
          <select id="f-jenis" required>
            <option value="">Pilih...</option>
            <option value="Pengeluaran">Pengeluaran</option>
            <option value="Pemasukan">Pemasukan</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Metode</label>
        <div class="sel-wrap">
          <select id="f-metode" required>
            <option value="">Pilih...</option>
            <option value="Cash">Cash</option>
            <option value="Non-Tunai">Non-Tunai</option>
          </select>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <div class="field">
        <label>Kategori</label>
        <div class="sel-wrap">
          <select id="f-kategori" required>
            <option value="">— pilih Siapa dulu —</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">Detail</div>
    <div class="field" style="margin-bottom:10px">
      <label>Keterangan</label>
      <input type="text" id="f-keterangan" placeholder="cth: Tagihan listrik Juni" enterkeyhint="next" required>
    </div>
    <div class="field">
      <label>Jumlah</label>
      <div class="jumlah-wrap">
        <span class="jumlah-prefix">Rp</span>
        <input type="number" id="f-jumlah" placeholder="0" min="1" inputmode="numeric" required>
      </div>
    </div>

    <button type="submit" class="btn-submit" id="btn-submit">Simpan Transaksi</button>
  </form>
</div>

<!-- ===== DASHBOARD ===== -->
<div class="page" id="page-dashboard">
  <div class="dash-month-nav">
    <button id="dash-prev">‹</button>
    <span class="dash-month-label" id="dash-month-label">—</span>
    <button id="dash-next">›</button>
  </div>
  <div id="dash-content">
    <div class="loading-row">
      <div class="skeleton" style="height:110px;border-radius:16px"></div>
      <div class="skeleton" style="height:80px"></div>
      <div class="skeleton" style="height:220px"></div>
    </div>
  </div>
</div>

<!-- ===== RIWAYAT ===== -->
<div class="page" id="page-riwayat">
  <div class="filter-row">
    <div class="sel-wrap">
      <select id="fil-siapa">
        <option value="">Semua</option>
        <option value="Suami">Suami</option>
        <option value="Istri">Istri</option>
      </select>
    </div>
    <div class="sel-wrap">
      <select id="fil-jenis">
        <option value="">Semua Jenis</option>
        <option value="Pengeluaran">Pengeluaran</option>
        <option value="Pemasukan">Pemasukan</option>
      </select>
    </div>
  </div>
  <div class="tx-list" id="tx-list">
    <div class="loading-row">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── GANTI INI setelah deploy Apps Script ──
  const API = 'https://script.google.com/macros/s/AKfycbzgmZ9CaVzApUoQSE5d68ICzwGeinu3pMrmZOnGROhNdWFvy-k3-ETBbxlFZduHt9Cm6w/exec';

  const KATEGORI = {
    Suami: ['Keluarga & Orang Tua','Tagihan Rutin','Pekerjaan',
            'Anak & Sekolah','Konsumsi & Belanja','Gaya Hidup',
            'Pemeliharaan','Tabungan & Sosial'],
    Istri:  ['Keluarga & Orang Tua','Pekerjaan','Anak & Sekolah',
             'Gaya Hidup','Tabungan & Sosial']
  };

  // ── Init ──
  const $  = id => document.getElementById(id);
  const today = () => new Date().toISOString().split('T')[0];

  $('f-tanggal').value = today();
  $('hdr-date').textContent = new Date().toLocaleDateString('id-ID',
    { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // ── Nav tabs ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab, .page').forEach(el => el.classList.remove('active'));
      tab.classList.add('active');
      $('page-' + tab.dataset.page).classList.add('active');
      if (tab.dataset.page === 'riwayat')   loadRiwayat();
      if (tab.dataset.page === 'dashboard') loadDashboard();
    });
  });

  // ── Dropdown kategori ──
  $('f-siapa').addEventListener('change', () => {
    const siapa = $('f-siapa').value;
    const sel   = $('f-kategori');
    if (!siapa) {
      sel.innerHTML = '<option value="">— pilih Siapa dulu —</option>';
      return;
    }
    sel.innerHTML = '<option value="">Pilih kategori...</option>' +
      KATEGORI[siapa].map(k => `<option value="${k}">${k}</option>`).join('');
  });

  // ── Toast ──
  let toastTimer;
  function toast(msg, err = false) {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'toast show' + (err ? ' err' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = 'toast', 3200);
  }

  // ── Format rupiah ──
  const rp = n => 'Rp ' + Number(n).toLocaleString('id-ID');

  // ── Submit transaksi ──
  $('form-tx').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = $('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Menyimpan…';

    const params = new URLSearchParams({
      action    : 'add',
      tanggal   : $('f-tanggal').value,
      siapa     : $('f-siapa').value,
      jenis     : $('f-jenis').value,
      kategori  : $('f-kategori').value,
      keterangan: $('f-keterangan').value,
      jumlah    : $('f-jumlah').value,
      metode    : $('f-metode').value,
    });

    try {
      const res  = await fetch(API + '?' + params);
      const json = await res.json();
      if (json.ok) {
        toast('✓ Transaksi tersimpan!');
        _dashData = null; _anggaranData = null;
        $('form-tx').reset();
        $('f-tanggal').value = today();
        $('f-kategori').innerHTML = '<option value="">— pilih Siapa dulu —</option>';
      } else {
        toast('Gagal: ' + (json.error || 'unknown'), true);
      }
    } catch {
      toast('Gagal menyimpan. Cek koneksi.', true);
    }

    btn.disabled = false;
    btn.textContent = 'Simpan Transaksi';
  });

  // ── Load riwayat ──
  async function loadRiwayat() {
    const list = $('tx-list');
    list.innerHTML = '<div class="loading-row">' +
      '<div class="skeleton"></div>'.repeat(4) + '</div>';

    try {
      const res  = await fetch(API + '?action=get&t=' + Date.now());
      const json = await res.json();

      let rows = json.data || [];
      const fs = $('fil-siapa').value;
      const fj = $('fil-jenis').value;
      if (fs) rows = rows.filter(r => r.siapa === fs);
      if (fj) rows = rows.filter(r => r.jenis === fj);

      rows.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

      if (!rows.length) {
        list.innerHTML = '<div class="empty"><span>🗂️</span>Belum ada transaksi.</div>';
        return;
      }

      list.innerHTML = rows.map(r => {
        const tgl  = new Date(r.tanggal);
        const tglF = isNaN(tgl) ? r.tanggal :
          tgl.toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
        const masuk = r.jenis === 'Pemasukan';
        return `
          <div class="tx-card">
            <div class="tx-left">
              <div class="tx-keterangan">${r.keterangan}</div>
              <div class="tx-meta">
                <span class="badge badge-${r.siapa.toLowerCase()}">${r.siapa}</span>
                <span class="tx-kat">${r.kategori}</span>
                <span class="tx-tgl">· ${tglF}</span>
              </div>
            </div>
            <div class="tx-right">
              <div class="tx-jumlah${masuk ? ' masuk' : ''}">${masuk ? '+' : '-'}${rp(r.jumlah)}</div>
              <div class="tx-metode">${r.metode}</div>
            </div>
          </div>`;
      }).join('');
    } catch {
      list.innerHTML = '<div class="empty"><span>⚠️</span>Gagal memuat data.</div>';
    }
  }

  // ── Dashboard ──
  const BULAN_ID = ['Januari','Februari','Maret','April','Mei','Juni',
                    'Juli','Agustus','September','Oktober','November','Desember'];
  let _dashData     = null;
  let _anggaranData = null;
  let dashYear  = new Date().getFullYear();
  let dashMonth = new Date().getMonth();

  $('dash-prev').addEventListener('click', () => {
    dashMonth--; if (dashMonth < 0) { dashMonth = 11; dashYear--; }
    renderDash();
  });
  $('dash-next').addEventListener('click', () => {
    dashMonth++; if (dashMonth > 11) { dashMonth = 0; dashYear++; }
    renderDash();
  });

  async function loadDashboard() {
    if (!_dashData || !_anggaranData) {
      $('dash-content').innerHTML = '<div class="loading-row">' +
        '<div class="skeleton" style="height:110px;border-radius:16px"></div>' +
        '<div class="skeleton" style="height:80px"></div>' +
        '<div class="skeleton" style="height:220px"></div></div>';
      try {
        const t = Date.now();
        const [resTx, resAng] = await Promise.all([
          fetch(API + '?action=get&t=' + t),
          fetch(API + '?action=anggaran&t=' + t)
        ]);
        const [jsonTx, jsonAng] = await Promise.all([resTx.json(), resAng.json()]);
        _dashData     = jsonTx.data  || [];
        _anggaranData = jsonAng.data || [];
      } catch {
        $('dash-content').innerHTML = '<div class="dash-empty"><span>⚠️</span>Gagal memuat data.</div>';
        return;
      }
    }
    renderDash();
  }

  function renderDash() {
    $('dash-month-label').textContent = BULAN_ID[dashMonth] + ' ' + dashYear;

    const rows = (_dashData || []).filter(r => {
      const d = new Date(r.tanggal);
      return d.getFullYear() === dashYear && d.getMonth() === dashMonth;
    });

    if (!rows.length) {
      $('dash-content').innerHTML = '<div class="dash-empty"><span>📭</span>Belum ada transaksi bulan ini.</div>';
      return;
    }

    const keluar = rows.filter(r => r.jenis === 'Pengeluaran');
    const masuk  = rows.filter(r => r.jenis === 'Pemasukan');
    const totalKeluar = keluar.reduce((s, r) => s + Number(r.jumlah), 0);
    const totalMasuk  = masuk.reduce((s,  r) => s + Number(r.jumlah), 0);

    const suamiKeluar = keluar.filter(r => r.siapa === 'Suami').reduce((s, r) => s + Number(r.jumlah), 0);
    const istriKeluar = keluar.filter(r => r.siapa === 'Istri').reduce((s,  r) => s + Number(r.jumlah), 0);
    const suamiMasuk  = masuk.filter(r => r.siapa === 'Suami').reduce((s, r) => s + Number(r.jumlah), 0);
    const istriMasuk  = masuk.filter(r => r.siapa === 'Istri').reduce((s,  r) => s + Number(r.jumlah), 0);
    const suamiTx = keluar.filter(r => r.siapa === 'Suami').length;
    const istriTx = keluar.filter(r => r.siapa === 'Istri').length;

    // budget: buat map {siapa|kategori: jumlah}
    const ang = _anggaranData || [];
    const angKey = (siapa, kat) => (siapa + '|' + kat).toLowerCase();
    const angMap = {};
    ang.forEach(a => {
      const siapa = a.siapa || a['who'] || '';
      const kat   = a.kategori || a['category'] || '';
      const jml   = Number(a.jumlah || a.anggaran || 0);
      const k = angKey(siapa, kat);
      angMap[k] = (angMap[k] || 0) + jml;
    });
    // total anggaran per kategori (gabung suami+istri)
    const angKatMap = {};
    ang.forEach(a => {
      const kat = a.kategori || a['category'] || '';
      const jml = Number(a.jumlah || a.anggaran || 0);
      angKatMap[kat] = (angKatMap[kat] || 0) + jml;
    });
    const totalAnggaran = Object.values(angKatMap).reduce((s, v) => s + v, 0);

    // per kategori aktual
    const katMap = {};
    keluar.forEach(r => { katMap[r.kategori] = (katMap[r.kategori] || 0) + Number(r.jumlah); });
    const katSorted = Object.entries(katMap).sort((a, b) => b[1] - a[1]);

    const cashTotal     = keluar.filter(r => r.metode === 'Cash').reduce((s, r) => s + Number(r.jumlah), 0);
    const nonTunaiTotal = keluar.filter(r => r.metode !== 'Cash').reduce((s, r) => s + Number(r.jumlah), 0);

    const net = totalMasuk - totalKeluar;
    const netLabel = net >= 0 ? 'surplus' : 'defisit';
    const netStr   = (net >= 0 ? '+' : '−') + rp(Math.abs(net));

    const hasAnggaran = totalAnggaran > 0;

    $('dash-content').innerHTML = `
      <div class="dash-total-card">
        <div class="dash-total-label">Total Pengeluaran${hasAnggaran ? ' · Anggaran ' + rp(totalAnggaran) : ''}</div>
        <div class="dash-total-amount">${rp(totalKeluar)}</div>
        ${totalMasuk > 0
          ? `<div class="dash-net ${netLabel}">${netStr} ${netLabel} · pendapatan ${rp(totalMasuk)}</div>`
          : ''}
      </div>

      <div class="dash-person-row">
        <div class="dash-person-card suami">
          <div class="dash-person-name">Suami</div>
          <div class="dash-person-amount">${rp(suamiKeluar)}</div>
          <div class="dash-person-tx">${suamiTx} transaksi</div>
        </div>
        <div class="dash-person-card istri">
          <div class="dash-person-name">Istri</div>
          <div class="dash-person-amount">${rp(istriKeluar)}</div>
          <div class="dash-person-tx">${istriTx} transaksi</div>
        </div>
      </div>

      <div class="dash-section">Pengeluaran per Kategori${hasAnggaran ? ' vs Anggaran' : ''}</div>
      <div class="dash-kat-list">
        ${katSorted.map(([kat, aktual]) => {
          const budget = angKatMap[kat] || 0;
          const hasBudget = budget > 0;
          const pct  = hasBudget ? Math.round(aktual / budget * 100) : 0;
          const barW = hasBudget ? Math.min(pct, 100) : 100;
          const cls  = hasBudget ? (pct > 100 ? 'over' : pct >= 85 ? 'warn' : '') : '';
          return `
          <div class="dash-kat-item">
            <div class="dash-kat-header">
              <span class="dash-kat-name">${kat}</span>
              <span class="dash-kat-amount">${rp(aktual)}</span>
            </div>
            ${hasBudget ? `
            <div class="dash-kat-header" style="margin-bottom:6px">
              <span class="dash-kat-budget ${cls}">
                ${pct > 100 ? '⚠️ ' : ''}dari ${rp(budget)}
              </span>
              <span class="dash-kat-pct" style="${pct>100?'color:var(--red)':pct>=85?'color:#d97706':''}">${pct}%</span>
            </div>` : ''}
            <div class="dash-bar-bg">
              <div class="dash-bar-fill ${cls}" style="width:${barW}%"></div>
            </div>
          </div>`;
        }).join('')}
      </div>

      ${totalMasuk > 0 ? `
      <div class="dash-section">Pendapatan</div>
      <div class="dash-person-row">
        <div class="dash-person-card suami">
          <div class="dash-person-name">Suami</div>
          <div class="dash-person-amount" style="color:var(--green)">${rp(suamiMasuk)}</div>
          <div class="dash-person-tx">${masuk.filter(r=>r.siapa==='Suami').length} transaksi</div>
        </div>
        <div class="dash-person-card istri">
          <div class="dash-person-name">Istri</div>
          <div class="dash-person-amount" style="color:var(--green)">${rp(istriMasuk)}</div>
          <div class="dash-person-tx">${masuk.filter(r=>r.siapa==='Istri').length} transaksi</div>
        </div>
      </div>` : ''}

      <div class="dash-section">Metode Bayar</div>
      <div class="dash-metode-row">
        <div class="dash-metode-card">
          <div class="dash-metode-name">💵 Cash</div>
          <div class="dash-metode-amount">${rp(cashTotal)}</div>
        </div>
        <div class="dash-metode-card">
          <div class="dash-metode-name">💳 Non-Tunai</div>
          <div class="dash-metode-amount">${rp(nonTunaiTotal)}</div>
        </div>
      </div>`;
  }

  // filter change
  ['fil-siapa','fil-jenis'].forEach(id => $('id' in {} ? id : id)
    .addEventListener ? $('fil-siapa') && $('fil-jenis') : null);
  document.querySelectorAll('#fil-siapa, #fil-jenis')
    .forEach(el => el.addEventListener('change', loadRiwayat));
</script>
</body>
</html>
